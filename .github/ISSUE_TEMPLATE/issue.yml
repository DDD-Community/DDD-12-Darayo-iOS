name: 📝 이슈 템플릿
description: 기능 구현, 버그 수정, 문서 작업 등 모든 작업에 사용하는 통합 이슈 템플릿입니다.
title: "[작업유형] 이슈 제목을 작성해주세요"
labels: []
body:
  - type: input
    id: linked_pr
    attributes:
      label: Pull Request
      description: 관련된 PR 번호를 입력하세요.
      placeholder: 예: #1

  - type: checkboxes
    id: type
    attributes:
      label: 작업 유형
      options:
        - label: 기능 구현
        - label: 버그 수정
        - label: 리팩토링
        - label: 환경 설정
        - label: 문서 작성
        - label: 기타

  - type: textarea
    id: description
    attributes:
      label: 설명
      description: 어떤 작업인지 설명해주세요.
      placeholder: 여기에 내용을 입력하세요.
    validations:
      required: true
